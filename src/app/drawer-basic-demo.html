<theme-switcher />

<!-- Trigger to start -->
<p-button
  label="Open Root"
  (click)="openNext({id: '1', label: 'Main'})"
></p-button>

@for (node of activePath(); track node.id; let i = $index) {
<p-drawer
  [(visible)]="node.visible"
  (onHide)="finalizeClose(i)"
  [header]="node.label"
  position="right"
>
  <ng-template pTemplate="content">
    <!-- Logic to open the next drawer -->
    <!-- Clicking this triggers the NEXT drawer in the stack -->
    {{ node.id }} - {{ i }}
    <div class="p-3">
      <p-button
        label="Next"
        (click)="openNext({id: +node.id+1, label: 'Child of ' + node.label})"
      ></p-button>
      Open Next Level
    </div>

    <!-- 'Back' button only triggers the animation, not the array slice -->
    <p-button label="Back" (click)="node.visible = false"></p-button>
  </ng-template>
</p-drawer>
}
